<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>正在检测…</title>
  <style>
    body {
      font-family: system-ui, "Microsoft YaHei", sans-serif;
      background: #f4f6f8; color: #333;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; margin: 0;
    }
    .card {
      background: #fff; border-radius: 12px; padding: 48px 56px;
      box-shadow: 0 8px 30px rgba(0,0,0,.08); text-align: center; max-width: 420px;
    }
    .spinner {
      width: 44px; height: 44px; margin: 0 auto 24px;
      border: 4px solid #e3e8ef; border-top-color: #0069d9;
      border-radius: 50%; animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 1.3rem; margin: 0 0 8px; }
    p  { color: #666; line-height: 1.6; margin: 0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h1>正在检测此页面…</h1>
    <p>请稍候，检测完成后将自动跳转。</p>
  </div>

  <script>
    // 心跳：反复轮询同源的 /__jru_heartbeat__，被 JrUntility 拦截并返回 JSON。
    // status: "pending"=继续等待  "allow"=放行(重载显示真实内容)  "block"=拦截(重载显示拦截页)
    var POLL_MS = 1500;
    function poll() {
      fetch("/__jru_heartbeat__?t=" + Date.now(), { cache: "no-store" })
        .then(function (r) { return r.json(); })
        .then(function (d) {
          if (d.status === "allow" || d.status === "block") {
            location.reload();
          } else {
            setTimeout(poll, POLL_MS);
          }
        })
        .catch(function () { setTimeout(poll, POLL_MS); });
    }
    setTimeout(poll, POLL_MS);
  </script>
</body>
</html>
